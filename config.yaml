# AuthRecon Configuration

scan:
  timeout: 10
  threads: 10
  follow_redirects: true
  verify_ssl: false

output:
  folder: output
  html_report: AuthRecon_Report.html
  excel_report: AuthRecon_Report.xlsx

logging:
  level: INFO

detection:
  enable_waf_detection: true
  enable_api_gateway_detection: true
  enable_auth_detection: true