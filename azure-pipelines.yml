pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.10"
  outputDir: "output"

stages:
  - stage: AuthReconScan
    displayName: "AuthRecon - Authentication Recon Scan"

    jobs:
      - job: Scan
        displayName: "Run AuthRecon Scanner"

        steps:
          # ----------------------------
          # 1. Setup Python
          # ----------------------------
          - task: UsePythonVersion@0
            displayName: "Use Python $(pythonVersion)"
            inputs:
              versionSpec: "$(pythonVersion)"

          # ----------------------------
          # 2. Cache pip dependencies (optional but recommended)
          # ----------------------------
          - task: Cache@2
            displayName: "Cache pip dependencies"
            inputs:
              key: 'pip | "$(Agent.OS)" | requirements.txt'
              path: /home/vsts/.cache/pip

          # ----------------------------
          # 3. Install dependencies
          # ----------------------------
          - script: |
              set -e
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: "Install Python Dependencies"

          # ----------------------------
          # 4. Run AuthRecon scan
          # ----------------------------
          - script: |
              set -e
              echo "Starting AuthRecon Scan..."
              python authrecon.py
            displayName: "Run AuthRecon"

          # ----------------------------
          # 5. Debug: List outputs
          # ----------------------------
          - script: |
              echo "Listing output directory:"
              ls -R $(outputDir) || true
            displayName: "List Output Files"

          # ----------------------------
          # 6. Publish reports
          # ----------------------------
          - task: PublishBuildArtifacts@1
            displayName: "Publish AuthRecon Reports"
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)/$(outputDir)"
              ArtifactName: "authrecon-reports"
              publishLocation: Container

          # ----------------------------
          # 7. Optional: Publish logs (limited)
          # ----------------------------
          - task: PublishBuildArtifacts@1
            displayName: "Publish Logs"
            inputs:
              PathtoPublish: "$(System.DefaultWorkingDirectory)"
              ArtifactName: "authrecon-logs"
              publishLocation: Container
